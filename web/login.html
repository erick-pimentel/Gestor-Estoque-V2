<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gestor de Estoque V2</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <!-- ░░ HEADER ░░ -->
  <header class="site-header">
    <div class="brand">
      <div class="logo-icon">📦</div>
      <span class="brand-name">Gestor de Estoque V2</span>
    </div>
    <div class="header-actions">
      <a href="index.html" class="btn-outline-custom">
        <i class="bi bi-house-door"></i>
        <span class="d-none d-sm-inline">Início</span>
      </a>
    </div>
  </header>

  <!-- ░░ MAIN ░░ -->
  <main class="login-main">
    <div class="login-card">

      <!-- Logo / title -->
      <div class="card-logo">
        <div class="logo-circle">📦</div>
        <h1>Bem-vindo de volta</h1>
        <p>Faça login para acessar o sistema</p>
      </div>

      <!-- Error message -->
      <div class="login-error" id="loginError" role="alert">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
        <span class="err-msg">Usuário ou senha inválidos.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <div class="form-field">
          <i class="bi bi-person field-icon"></i>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Usuário"
            autocomplete="username"
            required />
        </div>

        <div class="form-field">
          <i class="bi bi-lock field-icon"></i>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Senha"
            autocomplete="current-password"
            required />
        </div>

        <button type="submit" class="login-submit">
          Entrar &nbsp;<i class="bi bi-arrow-right-circle"></i>
        </button>
      </form>

      <p class="login-footer-note">
        Problemas para acessar? Entre em contato com o administrador.
      </p>
    </div>
  </main>

  <!-- ░░ FOOTER ░░ -->
  <footer class="site-footer">
    &copy; 2024 Gestor de Estoque V2 &mdash; Desenvolvido por
    <a href="https://github.com/erick-pimentel" target="_blank" rel="noopener">Érick Pimentel</a>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmZiePD1hGa6i70HnMepZpbB9Hj"
    crossorigin="anonymous"></script>

  <!-- Custom JS -->
  <script src="js/main.js"></script>
</body>
</html>
