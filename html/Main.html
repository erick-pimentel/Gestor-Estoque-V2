<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início | Sistema de Estoque</title>
  <link rel="stylesheet" href="../css/Style.css" />
</head>
<body class="landing-page">
  <header class="site-header">
    <div class="brand">
      <div class="logo-icon">SE</div>
      <span>Sistema de Estoque</span>
    </div>
    <div class="header-actions">
      <a href="./Login.html" class="btn-primary-custom">Entrar</a>
    </div>
  </header>

  <main class="landing-main">
    <section class="hero-section">
      <div class="hero-grid" aria-hidden="true"></div>
      <div class="hero-content">
        <div class="hero-text">
          <h2>Controle de estoque simples e moderno</h2>
          <p>
            Organize produtos, fornecedores e movimentacoes em um unico sistema,
            com layout responsivo e fluxo direto para o uso no dia a dia.
          </p>
          <div class="hero-cta">
            <a href="./Login.html" class="btn-primary-custom">Acessar sistema</a>
          </div>
        </div>

        <div class="hero-visual" aria-hidden="true">
          <div class="hero-illustration">
            <div class="illus-header">
              <div class="illus-dot" style="background:#ea4335"></div>
              <div class="illus-dot" style="background:#fbbc04"></div>
              <div class="illus-dot" style="background:#34a853"></div>
            </div>
            <div class="stat-row">
              <div class="stat-card">
                <div class="stat-num">240</div>
                <div class="stat-lbl">Produtos</div>
              </div>
              <div class="stat-card">
                <div class="stat-num" style="color:#34a853">32</div>
                <div class="stat-lbl">Fornecedores</div>
              </div>
              <div class="stat-card">
                <div class="stat-num" style="color:#fbbc04">18</div>
                <div class="stat-lbl">Alertas</div>
              </div>
            </div>
            <div class="bar-row">
              <div class="bar" style="height:40%"></div>
              <div class="bar" style="height:62%"></div>
              <div class="bar" style="height:48%"></div>
              <div class="bar" style="height:78%"></div>
              <div class="bar" style="height:66%"></div>
              <div class="bar" style="height:90%"></div>
              <div class="bar" style="height:72%"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Projeto - Sistema de Estoque</p>
  </footer>
</body>
</html>
